<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Honeycomb Paint Rack (Columns: Letters / Rows: Numbers)</title>
    <style>
        :root {
            --bg-color: #121214;
            --panel-bg: #1a1a22;
            --accent-color: #ff9f1c;
            --text-color: #f4f4f9;
            --border-color: #2a2a35;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: var(--accent-color);
            margin-bottom: 25px;
            font-weight: 400;
            letter-spacing: 1px;
        }

        /* Info & Triad Panel */
        .panel {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .triad-display {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 1rem;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .triad-step {
            padding: 10px 18px;
            background: #252533;
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }

        .triad-step.selected {
            border-color: var(--accent-color);
            box-shadow: 0 0 10px rgba(255, 159, 28, 0.2);
        }

        .arrow {
            font-weight: bold;
            color: var(--accent-color);
        }

        /* HONEYCOMB DISPLAY GRID */
        .rack-outer {
            background: var(--panel-bg);
            padding: 40px 20px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            overflow-x: auto;
        }

        /* The rack now displays as horizontal columns side-by-side */
        .rack-grid {
            display: flex;
            gap: 4px; /* Tight horizontal gap between hex columns */
            position: relative;
            min-height: 550px;
        }

        /* Column Container */
        .grid-column {
            display: flex;
            flex-direction: column;
            gap: 4px; /* Vertical gap between hexes in same column */
            position: relative;
            width: 104px;
        }

        /* HONEYCOMB STAGGER: Every second column (B, D, F...) shifts down by half a hex */
        .grid-column.offset-column {
            transform: translateY(46px);
        }

        /* Column Label Headers */
        .column-label {
            position: absolute;
            top: -28px;
            width: 100%;
            text-align: center;
            font-size: 0.95rem;
            color: #85859c;
            font-weight: bold;
        }

        /* HEXAGON SLOT GEOMETRY */
        .slot-wrapper {
            position: relative;
            width: 104px;
            height: 116px;
            flex-shrink: 0;
        }

        .slot {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: #2e2e3a;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            padding: 14px 8px;
            box-sizing: border-box;
            cursor: pointer;
            transition: transform 0.15s ease, filter 0.15s ease;
            text-shadow: 0 1px 2px rgba(0,0,0,0.9);
        }

        .slot:hover {
            transform: scale(1.06);
            filter: brightness(1.2);
            z-index: 10;
        }

        .slot.active-selection {
            transform: scale(1.06);
            filter: drop-shadow(0 0 10px var(--accent-color)) brightness(1.15);
            z-index: 9;
        }

        .slot.empty {
            background-color: transparent;
            background-image: radial-gradient(circle, #252533 55%, transparent 58%);
            border: 1px dashed #4e4e64;
            clip-path: none;
            border-radius: 50%;
            width: 86px;
            height: 86px;
            top: 15px;
            left: 9px;
        }

        .slot-id {
            font-size: 0.65rem;
            color: rgba(255,255,255,0.4);
            font-weight: bold;
            margin-bottom: 2px;
        }

        .paint-name {
            font-size: 0.7rem;
            font-weight: bold;
            text-align: center;
            word-wrap: break-word;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            max-width: 88px;
            line-height: 1.1;
            color: #ffffff;
        }

        .paint-type {
            font-size: 0.55rem;
            text-align: center;
            text-transform: uppercase;
            font-weight: bold;
            color: rgba(255,255,255,0.6);
            margin-top: 2px;
        }

        /* EDIT CONTROLS - PERMANENTLY VISIBLE */
        .actions {
            position: absolute;
            bottom: 14px;
            display: flex;
            gap: 4px;
            z-index: 15;
            width: 100%;
            justify-content: center;
        }

        .btn {
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.55rem;
            cursor: pointer;
            font-weight: bold;
        }

        .btn:hover {
            background: var(--accent-color);
            color: black;
            border-color: var(--accent-color);
        }

        .btn-delete {
            background: rgba(217, 4, 41, 0.9);
        }
        .btn-delete:hover {
            background: #ef233c;
            border-color: #ef233c;
        }
    </style>
</head>
<body>

    let selectedSlotId = null;

    function getFamilyColor(family, type) {
        if (!family) return '#2e2e3a';
        const f = family.toLowerCase();
        let baseHex = '#4a4a5a';
        if (f.includes('black')) baseHex = '#1a1a1a';
        else if (f.includes('grey') || f.includes('gray')) baseHex = '#4e5154';
        else if (f.includes('white')) baseHex = '#dcdce3';
        else if (f.includes('deep red') || f.includes('dark magic')) baseHex = '#5c0d12';
        else if (f.includes('red') || f.includes('warm')) baseHex = '#9e1b1b';
        else if (f.includes('blue') || f.includes('royal') || f.includes('deep blue')) baseHex = '#1c3b73';
        else if (f.includes('green') || f.includes('forest') || f.includes('vibrant green')) baseHex = '#1b4d22';
        else if (f.includes('purple') || f.includes('violet') || f.includes('night blue')) baseHex = '#411d5c';
        else if (f.includes('gold')) baseHex = '#8a6f28';
        else if (f.includes('silver')) baseHex = '#70777a';
        else if (f.includes('flesh')) baseHex = '#b87d63';
        else if (f.includes('tan') || f.includes('brown') || f.includes('earth')) baseHex = '#5e412f';
        else if (f.includes('yellow') || f.includes('bright yellow')) baseHex = '#bfa11b';

        if (type === 'Base') return baseHex;
        if (type === 'Layer 1') return adjustColorBrightness(baseHex, 25);
        if (type === 'Layer 2') return adjustColorBrightness(baseHex, 50);
        return baseHex;
    }

    function adjustColorBrightness(hex, percent) {
        let R = parseInt(hex.substring(1,3),16);
        let G = parseInt(hex.substring(3,5),16);
        let B = parseInt(hex.substring(5,7),16);
        R = parseInt(R + percent); G = parseInt(G + percent); B = parseInt(B + percent);
        R = (R<255)?R:255; G = (G<255)?G:255; B = (B<255)?B:255;
        const rHex = (R.toString(16).length==1)?"0"+R.toString(16):R.toString(16);
        const gHex = (G.toString(16).length==1)?"0"+G.toString(16):G.toString(16);
        const bHex = (B.toString(16).length==1)?"0"+B.toString(16):B.toString(16);
        return "#"+rHex+gHex+bHex;
    }

    function renderRack() {
        const containerMaster = document.getElementById('master-rack-container');
        containerMaster.innerHTML = '';

        // Extract column letter indicators (A, B, C...)
        const distinctColumns = [...new Set(rackData.map(item => item.slot.charAt(0)))].sort();

        // Stagger engine logic tracking
        let shiftToggle = false;

        distinctColumns.forEach(colLetter => {
            const columnWrapper = document.createElement('div');
            // Give every alternate column the offset class
            columnWrapper.className = `grid-column ${shiftToggle ? 'offset-column' : ''}`;
            columnWrapper.id = `col-${colLetter}`;

            const header = document.createElement('div');
            header.className = 'column-label';
            header.innerText = `Col ${colLetter}`;
            columnWrapper.appendChild(header);

            containerMaster.appendChild(columnWrapper);
            shiftToggle = !shiftToggle; // flip state
        });

        // Group paint entries chronologically under their corresponding visual hex columns
        rackData.forEach(item => {
            const colLetter = item.slot.charAt(0);
            const container = document.getElementById(`col-${colLetter}`);
            if (!container) return;

            const wrapper = document.createElement('div');
            wrapper.className = 'slot-wrapper';
            
            const slotEl = document.createElement('div');
            slotEl.className = `slot ${!item.name ? 'empty' : ''} ${selectedSlotId === item.slot ? 'active-selection' : ''}`;
            
            if (item.name) {
                slotEl.style.backgroundColor = getFamilyColor(item.family, item.type);
                slotEl.onclick = () => selectSlot(item.slot);

                const slotIdEl = document.createElement('div');
                slotIdEl.className = 'slot-id';
                slotIdEl.innerText = item.slot;

                const nameEl = document.createElement('div');
                nameEl.className = 'paint-name';
                nameEl.innerText = item.name;
                
                const typeEl = document.createElement('div');
                typeEl.className = 'paint-type';
                typeEl.innerText = item.type;

                // Permanent on-screen modification controls 
                const actionsEl = document.createElement('div');
                actionsEl.className = 'actions';
                
                const editBtn = document.createElement('button');
                editBtn.className = 'btn';
                editBtn.innerText = 'Swap';
                editBtn.onclick = (e) => { e.stopPropagation(); changePaint(item.slot); };

                const delBtn = document.createElement('button');
                delBtn.className = 'btn btn-delete';
                delBtn.innerText = 'X';
                delBtn.onclick = (e) => { e.stopPropagation(); clearSlot(item.slot); };

                actionsEl.appendChild(editBtn);
                actionsEl.appendChild(delBtn);

                slotEl.appendChild(slotIdEl);
                slotEl.appendChild(nameEl);
                slotEl.appendChild(typeEl);
                wrapper.appendChild(slotEl);
                wrapper.appendChild(actionsEl);
            } else {
                slotEl.onclick = () => changePaint(item.slot);
                const addEl = document.createElement('div');
                addEl.className = 'paint-name';
                addEl.style.color = '#55556d';
                addEl.style.marginTop = '18px';
                addEl.innerText = `+ ${item.slot}`;
                slotEl.appendChild(addEl);
                wrapper.appendChild(slotEl);
            }

            container.appendChild(wrapper);
        });
    }

    function selectSlot(slotId) {
        selectedSlotId = slotId;
        renderRack();

        const currentPaint = rackData.find(p => p.slot === slotId);
        const viewerPanel = document.getElementById('viewer-panel');
        const activeInfo = document.getElementById('active-info');
        const infoTitle = document.getElementById('info-title');
        const triadContainer = document.getElementById('triad-container');

        if (!currentPaint || !currentPaint.name) {
            viewerPanel.firstElementChild.style.display = 'block';
            activeInfo.style.display = 'none';
            return;
        }

        viewerPanel.firstElementChild.style.display = 'none';
        activeInfo.style.display = 'block';
        infoTitle.innerText = `[${currentPaint.brand}] ${currentPaint.family} Triad Progression`;

        const familyTriad = rackData.filter(p => p.family === currentPaint.family && p.family !== null);
        const orderMap = { "Base": 1, "Layer 1": 2, "Layer 2": 3 };
        familyTriad.sort((a, b) => (orderMap[a.type] || 99) - (orderMap[b.type] || 99));

        triadContainer.innerHTML = '';
        familyTriad.forEach((step, idx) => {
            const stepEl = document.createElement('div');
            stepEl.className = 'triad-step';
            stepEl.innerText = `${step.type}: ${step.name}`;
            
            if (step.slot === slotId) {
                stepEl.classList.add('selected');
                stepEl.style.fontWeight = 'bold';
            }

            triadContainer.appendChild(stepEl);

            if (idx < familyTriad.length - 1) {
                const arrow = document.createElement('div');
                arrow.className = 'arrow';
                arrow.innerHTML = '&#10142;';
                triadContainer.appendChild(arrow);
            }
        });
    }

    function clearSlot(slotId) {
        const item = rackData.find(p => p.slot === slotId);
        if (item) {
            item.name = null;
            item.type = "Open Slot";
            item.family = null;
            if (selectedSlotId === slotId) selectedSlotId = null;
            renderRack();
            selectSlot(null);
        }
    }

    function changePaint(slotId) {
        const newName = prompt("Enter Paint Name:");
        if (!newName) return;
        const newType = prompt("Enter Type (Base, Layer 1, Layer 2):", "Layer 1");
        const newFamily = prompt("Enter Color Family Set Name:", "Custom Mix");
        const newBrand = prompt("Enter Brand (Citadel / AK Interactive):", "AK Interactive");

        const item = rackData.find(p => p.slot === slotId);
        if (item) {
            item.name = newName;
            item.type = newType;
            item.family = newFamily;
            item.brand = newBrand;
            renderRack();
            selectSlot(slotId);
        }
    }

    renderRack();
</script>
</body>
</html>
