<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Paint Rack Manager</title>
    <style>
        :root {
            --bg-color: #1e1e24;
            --card-bg: #2a2a35;
            --accent-color: #ff9f1c;
            --text-color: #f4f4f9;
            --border-color: #3f3f52;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: var(--accent-color);
            margin-bottom: 30px;
        }

        /* Info & Triad Panel */
        .panel {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 30px;
            min-height: 80px;
        }

        .triad-display {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 1.1rem;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .triad-step {
            padding: 8px 16px;
            background: #353545;
            border-radius: 4px;
            border: 1px solid var(--border-color);
        }

        .triad-step.selected {
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        .arrow {
            font-weight: bold;
            color: var(--accent-color);
        }

        /* Grid Layout */
        .grid-row {
            margin-bottom: 25px;
        }

        .row-title {
            font-size: 1.2rem;
            margin-bottom: 10px;
            color: #a5a5b5;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 5px;
        }

        .paint-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 10px;
        }

        /* Paint Slots */
        .slot {
            background-color: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 6px;
            padding: 10px;
            min-height: 95px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }

        .slot:hover {
            border-color: #55556d;
            transform: translateY(-2px);
        }

        .slot.active-selection {
            border-color: var(--accent-color);
            box-shadow: 0 0 8px rgba(255, 159, 28, 0.3);
        }

        .slot.empty {
            border-style: dashed;
            background-color: transparent;
            justify-content: center;
            align-items: center;
        }

        .slot-id {
            font-size: 0.75rem;
            color: #75758c;
            font-weight: bold;
            position: absolute;
            top: 5px;
            left: 5px;
        }

        .paint-name {
            font-size: 0.85rem;
            font-weight: 600;
            margin-top: 15px;
            text-align: center;
            word-wrap: break-word;
        }

        .paint-type {
            font-size: 0.7rem;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--accent-color);
            margin-top: 4px;
        }

        .paint-brand {
            font-size: 0.65rem;
            color: #85859c;
            text-align: center;
        }

        /* Controls */
        .actions {
            margin-top: 8px;
            display: flex;
            justify-content: center;
            gap: 5px;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .slot:hover .actions {
            opacity: 1;
        }

        .btn {
            background: #4e4e64;
            border: none;
            color: white;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 0.7rem;
            cursor: pointer;
        }

        .btn:hover {
            background: var(--accent-color);
        }

        .btn-delete {
            background: #d90429;
        }

        .btn-delete:hover {
            background: #ef233c;
        }
    </style>
</head>
<body>

        <div id="active-info" style="display:none;">
            <h3 id="info-title" style="margin: 0 0 5px 0;"></h3>
            <div class="triad-display" id="triad-container"></div>

        { slot: "D1", brand: "Citadel", type: "Base", name: "Zandri Dust", family: "Tans" },

        { slot: "O1", brand: "AK Interactive", type: "Base", name: "Black Purple", family: "AK Dark Magic" },

        { slot: "P7", brand: "AK Interactive", type: "Base", name: "Dark Blue", family: "AK Night Blues" },
        { slot: "P8", brand: "AK Interactive", type: "Layer 1", name: "Imperial Blue", family: "AK Night Blues" },
        { slot: "P9", brand: "AK Interactive", type: "Layer 2", name: "King Purple", family: "AK Night Blues" },

        { slot: "P11", brand: "AK Interactive", type: "Layer 1", name: "Deep Green", family: "AK Forest Greens" },
        { slot: "P12", brand: "AK Interactive", type: "Layer 2", name: "Frog Green", family: "AK Forest Greens" },

        { slot: "Q1", brand: "AK Interactive", type: "Base", name: "Cold Green", family: "AK Vibrant Greens" },
        { slot: "Q2", brand: "AK Interactive", type: "Layer 1", name: "Green Skin Punch", family: "AK Vibrant Greens" },
        { slot: "Q3", brand: "AK Interactive", type: "Layer 2", name: "Slime Green", family: "AK Vibrant Greens" },
        { slot: "Q4", brand: "AK Interactive", type: "Base", name: "Anthracite Gray", family: "AK Charcoal Greys" },
        { slot: "Q5", brand: "AK Interactive", type: "Layer 1", name: "Basalt Gray", family: "AK Charcoal Greys" },
        { slot: "Q6", brand: "AK Interactive", type: "Layer 2", name: "Graphite", family: "AK Charcoal Greys" },
        { slot: "Q7", brand: "AK Interactive", type: "Base", name: "Black", family: "AK Pure Tones" },
        { slot: "Q8", brand: "AK Interactive", type: "Layer 1", name: "Silver Gray", family: "AK Pure Tones" },
        { slot: "Q9", brand: "AK Interactive", type: "Layer 2", name: "White", family: "AK Pure Tones" },
        { slot: "Q10", brand: "AK Interactive", type: "Open Slot", name: null, family: null },
        { slot: "Q11", brand: "AK Interactive", type: "Open Slot", name: null, family: null },
        { slot: "Q12", brand: "AK Interactive", type: "Open Slot", name: null, family: null }
    ];

    let selectedSlotId = null;

    // Dynamically builds row headers and grid segments found within our database map
    function renderRack() {
        const containerMaster = document.getElementById('rack-rows-container');
        containerMaster.innerHTML = '';

        // Extract and sort distinct Row letter identifiers present in the dataset
        const distinctRows = [...new Set(rackData.map(item => item.slot.charAt(0)))].sort();

        distinctRows.forEach(rowLetter => {
            const rowWrapper = document.createElement('div');
            rowWrapper.className = 'grid-row';

            const brandHeader = rowLetter <= 'N' ? 'Citadel Collection' : 'AK Interactive Collection';
            const rowTitle = document.createElement('div');
            rowTitle.className = 'row-title';
            rowTitle.innerText = `Row ${rowLetter}: ${brandHeader}`;

            const paintGrid = document.createElement('div');
            paintGrid.className = 'paint-grid';
            paintGrid.id = `row-${rowLetter}`;

            rowWrapper.appendChild(rowTitle);
            rowWrapper.appendChild(paintGrid);
            containerMaster.appendChild(rowWrapper);
        });

        // Inject items seamlessly into their target structural grids
        rackData.forEach(item => {
            const rowLetter = item.slot.charAt(0);
            const container = document.getElementById(`row-${rowLetter}`);
            if (!container) return;
            
            const slotEl = document.createElement('div');
            slotEl.className = `slot ${!item.name ? 'empty' : ''} ${selectedSlotId === item.slot ? 'active-selection' : ''}`;
            slotEl.onclick = () => selectSlot(item.slot);

            const slotIdEl = document.createElement('div');
            slotIdEl.className = 'slot-id';
            slotIdEl.innerText = item.slot;
            slotEl.appendChild(slotIdEl);

            if (item.name) {
                const nameEl = document.createElement('div');
                nameEl.className = 'paint-name';
                nameEl.innerText = item.name;
                
                const typeEl = document.createElement('div');
                typeEl.className = 'paint-type';
                typeEl.innerText = item.type;

                const brandEl = document.createElement('div');
                brandEl.className = 'paint-brand';
                brandEl.innerText = item.brand || "";

                const actionsEl = document.createElement('div');
                actionsEl.className = 'actions';
                
                const editBtn = document.createElement('button');
                editBtn.className = 'btn';
                editBtn.innerText = 'Swap';
                editBtn.onclick = (e) => { e.stopPropagation(); changePaint(item.slot); };

                const delBtn = document.createElement('button');
                delBtn.className = 'btn btn-delete';
                delBtn.innerText = 'X';
                delBtn.onclick = (e) => { e.stopPropagation(); clearSlot(item.slot); };

                actionsEl.appendChild(editBtn);
                actionsEl.appendChild(delBtn);

                slotEl.appendChild(nameEl);
                slotEl.appendChild(typeEl);
                slotEl.appendChild(brandEl);
                slotEl.appendChild(actionsEl);
            } else {
                const addEl = document.createElement('div');
                addEl.className = 'paint-name';
                addEl.style.color = '#55556d';
                addEl.innerText = '+ Add';
                slotEl.appendChild(addEl);
                slotEl.onclick = () => changePaint(item.slot);
            }

            container.appendChild(slotEl);
        });
    }

    function selectSlot(slotId) {
        selectedSlotId = slotId;
        renderRack();

        const currentPaint = rackData.find(p => p.slot === slotId);
        const viewerPanel = document.getElementById('viewer-panel');
        const activeInfo = document.getElementById('active-info');
        const infoTitle = document.getElementById('info-title');
        const triadContainer = document.getElementById('triad-container');

        if (!currentPaint || !currentPaint.name) {
            viewerPanel.firstElementChild.style.display = 'block';
            activeInfo.style.display = 'none';
            return;
        }

        viewerPanel.firstElementChild.style.display = 'none';
        activeInfo.style.display = 'block';
        infoTitle.innerText = `(${currentPaint.brand || "System"}) ${currentPaint.family} Set Sequence`;

        // Gather colors sharing the same matching family identity label string
        const familyTriad = rackData.filter(p => p.family === currentPaint.family && p.family !== null);
        
        // Dynamic sorting check enforcing chronological alignment: Base -> Layer 1 -> Layer 2
        const orderMap = { "Base": 1, "Layer 1": 2, "Layer 2": 3 };
        familyTriad.sort((a, b) => (orderMap[a.type] || 99) - (orderMap[b.type] || 99));

        triadContainer.innerHTML = '';
        familyTriad.forEach((step, idx) => {
            const stepEl = document.createElement('div');
            stepEl.className = 'triad-step';
            stepEl.innerText = `${step.type}: ${step.name}`;
            
            // Highlight and bold selected element matching clicked slot state
            if (step.slot === slotId) {
                stepEl.classList.add('selected');
                stepEl.style.fontWeight = 'bold';
            }

            triadContainer.appendChild(stepEl);

            if (idx < familyTriad.length - 1) {
                const arrow = document.createElement('div');
                arrow.className = 'arrow';
                arrow.innerHTML = '&#10142;';
                triadContainer.appendChild(arrow);
            }
        });
    }

    // Dynamic unlinked storage configuration controllers
    function clearSlot(slotId) {
        const item = rackData.find(p => p.slot === slotId);
        if (item) {
            item.name = null;
            item.type = "Open Slot";
            item.family = null;
            if (selectedSlotId === slotId) selectedSlotId = null;
            renderRack();
            selectSlot(null);
        }
    }

    function changePaint(slotId) {
        const newName = prompt("Enter Paint Name:");
        if (!newName) return;
        const newType = prompt("Enter Type (Base, Layer 1, Layer 2):", "Layer 1");
        const newFamily = prompt("Enter Color Family Set Name:", "Custom Mix");
        const newBrand = prompt("Enter Brand (Citadel / AK Interactive):", "AK Interactive");

        const item = rackData.find(p => p.slot === slotId);
        if (item) {
            item.name = newName;
            item.type = newType;
            item.family = newFamily;
            item.brand = newBrand;
            renderRack();
            selectSlot(slotId);
        }
    }

    // Run layout generator initialization setup execution
    renderRack();
</script>

</html>
