<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Paint Rack Tracker Ultra</title>
    <style>
        :root {
            --bg-dark: #121214;
            --panel-bg: #1a1a1e;
            --border-color: #2c2c35;
            --text-main: #e1e1e6;
            --text-dim: #8f8f9d;
            --accent: #6200ee;
            --hex-w: 54px;
            --hex-h: 62px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            height: 100vh;
            box-sizing: border-box;
        }

        .header-container {
            width: 100%;
            max-width: 600px;
            background-color: var(--bg-dark);
            padding: 5px 0 10px 0;
            z-index: 50;
            flex-shrink: 0;
        }

        .search-bar {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background-color: var(--panel-bg);
            color: var(--text-main);
            font-size: 1rem;
            box-sizing: border-box;
            margin-bottom: 8px;
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--text-dim);
            background: var(--panel-bg);
            padding: 6px 12px;
            border-radius: 6px;
        }

        .grid-viewport {
            width: 100vw;
            flex-grow: 1;
            overflow: hidden; 
            position: relative;
            background: #0f0f11;
            border-radius: 12px;
            touch-action: none;
        }

        .grid-canvas {
            padding: 60px;
            background: #16161a;
            position: absolute;
            top: 0;
            left: 0;
            transform-origin: 0 0;
            will-change: transform;
            cursor: grab;
        }

        .grid-canvas:active { cursor: grabbing; }

        .hex-row {
            display: flex;
            margin-bottom: -16px; 
        }

        .hex-row:nth-child(odd) {
            margin-left: 29px;
        }

        .hex-cell {
            width: var(--hex-w);
            height: var(--hex-h);
            background-color: #24242b;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            margin-right: 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 0.65rem;
            cursor: pointer;
            position: relative;
            transition: opacity 0.2s ease;
            user-select: none;
        }

        .hex-coord {
            font-weight: bold;
            color: rgba(255, 255, 255, 0.3);
            margin-bottom: 1px;
            font-size: 0.55rem;
        }

        .hex-title {
            font-size: 0.5rem;
            text-align: center;
            width: 85%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #fff;
            font-weight: 600;
        }

        .brand-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            position: absolute;
            bottom: 8px;
        }
        .dot-citadel { background-color: #ffd700; }
        .dot-ak { background-color: #00ff66; }
        .dot-ap { background-color: #ff007f; }

        .hex-dimmed { opacity: 0.15 !important; }

        .panel {
            width: 100%;
            max-width: 600px;
            background-color: var(--panel-bg);
            border-radius: 12px 12px 0 0;
            border: 1px solid var(--border-color);
            padding: 15px;
            box-sizing: border-box;
            display: none;
            position: fixed;
            bottom: 0;
            z-index: 100;
            box-shadow: 0 -5px 25px rgba(0,0,0,0.5);
        }

        .swatch-display {
            width: 100%;
            height: 35px;
            border-radius: 6px;
            margin: 10px 0;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .triad-flow-container {
            background: #121214;
            padding: 10px;
            border-radius: 6px;
            font-size: 0.85rem;
            line-height: 1.4;
            margin-top: 8px;
        }

        .triad-step { color: var(--text-dim); }
        .triad-active { color: #fff !important; font-weight: bold; text-decoration: underline; }

        .brand-tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 10px;
        }

        .tab-btn {
            flex: 1;
            background: #25252c;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            cursor: pointer;
        }

        .tab-active { background: var(--accent); font-weight: bold; }

        .catalog-search-input {
            width: 100%;
            padding: 10px;
            background: #121214;
            border: 1px solid var(--border-color);
            color: white;
            border-radius: 6px;
            box-sizing: border-box;
            margin-bottom: 10px;
        }

        .dropdown-list {
            max-height: 120px;
            overflow-y: auto;
            background: #121214;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            margin-bottom: 10px;
        }

        .dropdown-item {
            padding: 10px;
            font-size: 0.85rem;
            border-bottom: 1px solid #1a1a1e;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
        }

        .action-row {
            display: flex;
            gap: 10px;
        }

        .btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-save { background: #00cc66; color: #fff; }
        .btn-clear { background: #cc3333; color: #fff; }
        .close-panel-x {
            float: right;
            cursor: pointer;
            color: var(--text-dim);
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="header-container">
        <input type="text" id="mainSearch" class="search-bar" placeholder="Search name, range, or type (e.g. shade, base)..." oninput="runGlobalSearch()">
        <div class="stats-bar">
            <span id="stat-total">Paints Placed: 0</span>
            <span id="stat-empty">Empty Slots: 320</span>
        </div>
    </div>

    <div class="grid-viewport" id="viewport">
        <div class="grid-canvas" id="canvas-grid"></div>
    </div>

    <div id="view-panel" class="panel">
        <span class="close-panel-x" onclick="closePanels()">✕</span>
        <h3 id="view-name" style="margin:0;">Paint Name</h3>
        <span id="view-meta" style="font-size:0.8rem; color:var(--text-dim);">Brand · Type</span>
        <div id="view-swatch" class="swatch-display"></div>
        <div class="triad-flow-container">
            <strong>Triad Alignment (Vertically Down):</strong><br>
            <div id="view-triad" style="margin-top:5px;"></div>
        </div>
    </div>

    <div id="edit-panel" class="panel">
        <span class="close-panel-x" onclick="closePanels()">✕</span>
        <h3 id="edit-coords" style="margin:0 0 10px 0;">Assign Slot</h3>
        <div class="brand-tabs">
            <button class="tab-btn tab-active" onclick="filterTab('All', this)">All</button>
            <button class="tab-btn" onclick="filterTab('Citadel', this)">Citadel</button>
            <button class="tab-btn" onclick="filterTab('AK', this)">AK</button>
            <button class="tab-btn" onclick="filterTab('Army Painter', this)">AP</button>
        </div>
        <input type="text" id="catalogSearch" class="catalog-search-input" placeholder="Type pattern to filter complete database..." oninput="updateCatalogDropdown()">
        <div class="dropdown-list" id="dropdown-box"></div>
        <div class="action-row">
            <button class="btn btn-save" onclick="commitAssignment()">Save Paint</button>
            <button class="btn btn-clear" onclick="clearAssignment()">Vacate Slot</button>
        </div>
    </div>
