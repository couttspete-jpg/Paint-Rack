<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Hex Paint Rack Manager</title>
    <style>
        :root {
            --bg-color: #121214;
            --panel-bg: #1a1a22;
            --accent-color: #ff9f1c;
            --text-color: #f4f4f9;
            --border-color: #2a2a35;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: var(--accent-color);
            margin-bottom: 25px;
            font-weight: 400;
            letter-spacing: 1px;
        }

        /* Info & Triad Panel */
        .panel {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 40px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .triad-display {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 1rem;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .triad-step {
            padding: 10px 18px;
            background: #252533;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            transition: all 0.2s ease;
        }

        .triad-step.selected {
            border-color: var(--accent-color);
            box-shadow: 0 0 10px rgba(255, 159, 28, 0.2);
        }

        .arrow {
            font-weight: bold;
            color: var(--accent-color);
        }

        /* HORIZONTAL ROWS & HEX GRID LAYOUT */
        .grid-row {
            margin-bottom: 35px;
            background: var(--panel-bg);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .row-title {
            font-size: 1.1rem;
            margin-bottom: 20px;
            color: #85859c;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Hexagonal Grid Stacking Geometry */
        .paint-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            padding-bottom: 10px;
        }

        /* HEXAGON CONTAINER & SHAPE DEFINITION */
        .slot-wrapper {
            position: relative;
            width: 100px;
            height: 110px;
            margin-bottom: 5px;
        }

        .slot {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: #2e2e3a;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 12px;
            box-sizing: border-box;
            cursor: pointer;
            transition: transform 0.2s ease, filter 0.2s ease;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
        }

        .slot:hover {
            transform: scale(1.05);
            filter: brightness(1.15);
            z-index: 10;
        }

        .slot.active-selection {
            transform: scale(1.05);
            filter: drop-shadow(0 0 8px var(--accent-color)) brightness(1.1);
            z-index: 9;
        }

        .slot.empty {
            background-color: transparent;
            background-image: radial-gradient(circle, #252533 60%, transparent 62%);
            border: 1px dashed #4e4e64;
            clip-path: none;
            border-radius: 50%;
            width: 90px;
            height: 90px;
            top: 10px;
            left: 5px;
        }

        .slot-id {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.4);
            font-weight: bold;
            position: absolute;
            top: 14px;
        }

        .paint-name {
            font-size: 0.75rem;
            font-weight: bold;
            text-align: center;
            word-wrap: break-word;
            max-width: 85px;
            line-height: 1.1;
            margin-top: 12px;
            color: #ffffff;
        }

        .paint-type {
            font-size: 0.6rem;
            text-align: center;
            text-transform: uppercase;
            font-weight: bold;
            color: rgba(255,255,255,0.6);
            margin-top: 4px;
        }

        /* Hidden controls overlay inside Hex */
        .actions {
            position: absolute;
            bottom: 14px;
            display: flex;
            gap: 3px;
            opacity: 0;
            transition: opacity 0.2s ease;
            z-index: 15;
        }

        .slot-wrapper:hover .actions {
            opacity: 1;
        }

        .btn {
            background: rgba(0,0,0,0.75);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 1px 4px;
            border-radius: 3px;
            font-size: 0.55rem;
            cursor: pointer;
        }

        .btn:hover {
            background: var(--accent-color);
            color: black;
        }

        .btn-delete {
            background: rgba(217, 4, 41, 0.85);
        }
        .btn-delete:hover {
            background: #ef233c;
        }
    </style>
</head>
<body>

        { slot: "O1", brand: "AK Interactive", type: "Base", name: "Black Purple", family: "AK Dark Magic" },

        { slot: "P7", brand: "AK Interactive", type: "Base", name: "Dark Blue", family: "AK Night Blues" },
        { slot: "P8", brand: "AK Interactive", type: "Layer 1", name: "Imperial Blue", family: "AK Night Blues" },
        { slot: "P9", brand: "AK Interactive", type: "Layer 2", name: "King Purple", family: "AK Night Blues" },
        { slot: "P10", brand: "AK Interactive", type: "Base", name: "Black Green", family: "AK Forest Greens" },
        { slot: "P11", brand: "AK Interactive", type: "Layer 1", name: "Deep Green", family: "AK Forest Greens" },
        { slot: "P12", brand: "AK Interactive", type: "Layer 2", name: "Frog Green", family: "AK Forest Greens" },

        { slot: "Q1", brand: "AK Interactive", type: "Base", name: "Cold Green", family: "AK Vibrant Greens" },
        { slot: "Q2", brand: "AK Interactive", type: "Layer 1", name: "Green Skin Punch", family: "AK Vibrant Greens" },
        { slot: "Q3", brand: "AK Interactive", type: "Layer 2", name: "Slime Green", family: "AK Vibrant Greens" },
        { slot: "Q4", brand: "AK Interactive", type: "Base", name: "Anthracite Gray", family: "AK Charcoal Greys" },
        { slot: "Q5", brand: "AK Interactive", type: "Layer 1", name: "Basalt Gray", family: "AK Charcoal Greys" },
        { slot: "Q6", brand: "AK Interactive", type: "Layer 2", name: "Graphite", family: "AK Charcoal Greys" },
        { slot: "Q7", brand: "AK Interactive", type: "Base", name: "Black", family: "AK Pure Tones" },
        { slot: "Q8", brand: "AK Interactive", type: "Layer 1", name: "Silver Gray", family: "AK Pure Tones" },
        { slot: "Q9", brand: "AK Interactive", type: "Layer 2", name: "White", family: "AK Pure Tones" },
        { slot: "Q10", brand: "AK Interactive", type: "Open Slot", name: null, family: null },
        { slot: "Q11", brand: "AK Interactive", type: "Open Slot", name: null, family: null },
        { slot: "Q12", brand: "AK Interactive", type: "Open Slot", name: null, family: null }
    ];

    let selectedSlotId = null;

    // Automated representative color engine to visually map tone gradients dynamically across families
    function getFamilyColor(family, type) {
        if (!family) return '#2e2e3a';
        const f = family.toLowerCase();
        
        let baseHex = '#4a4a5a';
        if (f.includes('black')) baseHex = '#1a1a1a';
        else if (f.includes('grey') || f.includes('gray')) baseHex = '#4e5154';
        else if (f.includes('white')) baseHex = '#dcdce3';
        else if (f.includes('deep red') || f.includes('dark magic')) baseHex = '#5c0d12';
        else if (f.includes('red') || f.includes('warm')) baseHex = '#9e1b1b';
        else if (f.includes('blue') || f.includes('royal')) baseHex = '#1c3b73';
        else if (f.includes('green') || f.includes('forest')) baseHex = '#1b4d22';
        else if (f.includes('purple') || f.includes('violet')) baseHex = '#411d5c';
        else if (f.includes('gold')) baseHex = '#8a6f28';
        else if (f.includes('silver')) baseHex = '#70777a';
        else if (f.includes('flesh')) baseHex = '#b87d63';
        else if (f.includes('tan') || f.includes('brown') || f.includes('earth')) baseHex = '#5e412f';
        else if (f.includes('yellow')) baseHex = '#bfa11b';

        // Adjust darkness based on whether it is a Base, Layer 1, or Layer 2 to give visual gradient depth
        if (type === 'Base') return baseHex;
        if (type === 'Layer 1') return adjustColorBrightness(baseHex, 25);
        if (type === 'Layer 2') return adjustColorBrightness(baseHex, 50);
        return baseHex;
    }

    function adjustColorBrightness(hex, percent) {
        let R = parseInt(hex.substring(1,3),16);
        let G = parseInt(hex.substring(3,5),16);
        let B = parseInt(hex.substring(5,7),16);
        R = parseInt(R + percent); G = parseInt(G + percent); B = parseInt(B + percent);
        R = (R<255)?R:255; G = (G<255)?G:255; B = (B<255)?B:255;
        const rHex = (R.toString(16).length==1)?"0"+R.toString(16):R.toString(16);
        const gHex = (G.toString(16).length==1)?"0"+G.toString(16):G.toString(16);
        const bHex = (B.toString(16).length==1)?"0"+B.toString(16):B.toString(16);
        return "#"+rHex+gHex+bHex;
    }

    // Builds horizontal rows and injects layout geometric slots safely
    function renderRack() {
        const containerMaster = document.getElementById('rack-rows-container');
        containerMaster.innerHTML = '';

        const distinctRows = [...new Set(rackData.map(item => item.slot.charAt(0)))].sort();

        distinctRows.forEach(rowLetter => {
            const rowWrapper = document.createElement('div');
            rowWrapper.className = 'grid-row';

            const brandHeader = rowLetter <= 'D' ? 'Citadel Collection' : 'AK Interactive Collection';
            const rowTitle = document.createElement('div');
            rowTitle.className = 'row-title';
            rowTitle.innerText = `Row ${rowLetter} — ${brandHeader}`;

            const paintGrid = document.createElement('div');
            paintGrid.className = 'paint-grid';
            paintGrid.id = `row-${rowLetter}`;

            rowWrapper.appendChild(rowTitle);
            rowWrapper.appendChild(paintGrid);
            containerMaster.appendChild(rowWrapper);
        });

        rackData.forEach(item => {
            const rowLetter = item.slot.charAt(0);
            const container = document.getElementById(`row-${rowLetter}`);
            if (!container) return;

            const wrapper = document.createElement('div');
            wrapper.className = 'slot-wrapper';
            
            const slotEl = document.createElement('div');
            slotEl.className = `slot ${!item.name ? 'empty' : ''} ${selectedSlotId === item.slot ? 'active-selection' : ''}`;
            
            if (item.name) {
                slotEl.style.backgroundColor = getFamilyColor(item.family, item.type);
                slotEl.onclick = () => selectSlot(item.slot);

                const slotIdEl = document.createElement('div');
                slotIdEl.className = 'slot-id';
                slotIdEl.innerText = item.slot;

                const nameEl = document.createElement('div');
                nameEl.className = 'paint-name';
                nameEl.innerText = item.name;
                
                const typeEl = document.createElement('div');
                typeEl.className = 'paint-type';
                typeEl.innerText = item.type;

                const actionsEl = document.createElement('div');
                actionsEl.className = 'actions';
                
                const editBtn = document.createElement('button');
                editBtn.className = 'btn';
                editBtn.innerText = 'Swap';
                editBtn.onclick = (e) => { e.stopPropagation(); changePaint(item.slot); };

                const delBtn = document.createElement('button');
                delBtn.className = 'btn btn-delete';
                delBtn.innerText = 'X';
                delBtn.onclick = (e) => { e.stopPropagation(); clearSlot(item.slot); };

                actionsEl.appendChild(editBtn);
                actionsEl.appendChild(delBtn);

                slotEl.appendChild(slotIdEl);
                slotEl.appendChild(nameEl);
                slotEl.appendChild(typeEl);
                wrapper.appendChild(slotEl);
                wrapper.appendChild(actionsEl);
            } else {
                slotEl.onclick = () => changePaint(item.slot);
                const addEl = document.createElement('div');
                addEl.className = 'paint-name';
                addEl.style.color = '#55556d';
                addEl.style.marginTop = '0';
                addEl.innerText = `+ ${item.slot}`;
                slotEl.appendChild(addEl);
                wrapper.appendChild(slotEl);
            }

            container.appendChild(wrapper);
        });
    }

    function selectSlot(slotId) {
        selectedSlotId = slotId;
        renderRack();

        const currentPaint = rackData.find(p => p.slot === slotId);
        const viewerPanel = document.getElementById('viewer-panel');
        const activeInfo = document.getElementById('active-info');
        const infoTitle = document.getElementById('info-title');
        const triadContainer = document.getElementById('triad-container');

        if (!currentPaint || !currentPaint.name) {
            viewerPanel.firstElementChild.style.display = 'block';
            activeInfo.style.display = 'none';
            return;
        }

        viewerPanel.firstElementChild.style.display = 'none';
        activeInfo.style.display = 'block';
        infoTitle.innerText = `[${currentPaint.brand}] ${currentPaint.family} Triad Progression`;

        const familyTriad = rackData.filter(p => p.family === currentPaint.family && p.family !== null);
        const orderMap = { "Base": 1, "Layer 1": 2, "Layer 2": 3 };
        familyTriad.sort((a, b) => (orderMap[a.type] || 99) - (orderMap[b.type] || 99));

        triadContainer.innerHTML = '';
        familyTriad.forEach((step, idx) => {
            const stepEl = document.createElement('div');
            stepEl.className = 'triad-step';
            stepEl.innerText = `${step.type}: ${step.name}`;
            
            if (step.slot === slotId) {
                stepEl.classList.add('selected');
                stepEl.style.fontWeight = 'bold';
            }

            triadContainer.appendChild(stepEl);

            if (idx < familyTriad.length - 1) {
                const arrow = document.createElement('div');
                arrow.className = 'arrow';
                arrow.innerHTML = '&#10142;';
                triadContainer.appendChild(arrow);
            }
        });
    }

    function clearSlot(slotId) {
        const item = rackData.find(p => p.slot === slotId);
        if (item) {
            item.name = null;
            item.type = "Open Slot";
            item.family = null;
            if (selectedSlotId === slotId) selectedSlotId = null;
            renderRack();
            selectSlot(null);
        }
    }

    function changePaint(slotId) {
        const newName = prompt("Enter Paint Name:");
        if (!newName) return;
        const newType = prompt("Enter Type (Base, Layer 1, Layer 2):", "Layer 1");
        const newFamily = prompt("Enter Color Family Set Name:", "Custom Mix");
        const newBrand = prompt("Enter Brand (Citadel / AK Interactive):", "AK Interactive");

        const item = rackData.find(p => p.slot === slotId);
        if (item) {
            item.name = newName;
            item.type = newType;
            item.family = newFamily;
            item.brand = newBrand;
            renderRack();
            selectSlot(slotId);
        }
    }

    renderRack();
</script>
